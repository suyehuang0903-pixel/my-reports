<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>专属客服</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- 1. 安卓/鸿蒙：网站图标（可选，用于浏览器标签页） -->
    <link rel="icon" href="https://www.189.cn/upfiles/189v2/ah/images/2025/0/3e25a423-958b-4d7f-a4c6-5ac06248b6b4.png" type="image/png">

    <!-- 2. Open Graph 协议：控制微信/企业微信分享卡片 -->
    <meta property="og:title" content="专属客服" />
    <meta property="og:description" content="点击进入，联系您的专属客服" />
    <meta property="og:image" content="https://www.189.cn/upfiles/189v2/ah/images/2025/0/3e25a423-958b-4d7f-a4c6-5ac06248b6b4.png" />
    <meta property="og:url" content="https://ah.189.cn/kf?k=2IAw4G" />
    <meta property="og:type" content="website" />

    <!-- 3. iOS 企业微信专用：body 内的第一张图片会被抓取为图标 -->
    <img src="https://www.189.cn/upfiles/189v2/ah/images/2025/0/3e25a423-958b-4d7f-a4c6-5ac06248b6b4.png" alt="专属客服图标" style="display:none;">

    <!-- 4. 自动跳转到目标页面（0 秒后跳转） -->
    <meta http-equiv="refresh" content="0; url=https://ah.189.cn/kf?k=2IAw4G">
</head>
<body>
    <!-- 备用隐藏图片，确保抓取万无一失 -->
    <img src="https://www.189.cn/upfiles/189v2/ah/images/2025/0/3e25a423-958b-4d7f-a4c6-5ac06248b6b4.png" alt="专属客服" style="display:none;">
    <p style="text-align:center; margin-top:20vh; font-family:sans-serif;">正在跳转至专属客服页面，请稍候...</p>
</body>
</html>
